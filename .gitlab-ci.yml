stages:
  - ci
  - publish

.node-template:
  image: node:${NODE_VERSION}
  before_script:
    - npm ci

ci:
  extends: .node-template
  stage: ci
  parallel:
    matrix:
      - NODE_VERSION: ['18', '20']
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - npm run lint
    - npm run build
    - npm test

publish:
  extends: .node-template
  stage: publish
  variables:
    NODE_VERSION: '18'
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - npm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish --access public
